{% load static %}
<!DOCTYPE html>
<html lang="pt-br" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Amaral Cantina{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Fonte -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
</head>

<body>

    <!-- NAVBAR (cor original restaurada via CSS) -->
    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm sticky-top">
        <div class="container">

            <a class="navbar-brand d-flex align-items-center fw-semibold" href="/">

                <img src="{% static 'images/amaral-logo.jpeg' %}" class="me-2" alt="Logo">

                Amaral Cantina
            </a>

        </div>
    </nav>

    <!-- CONTEÚDO -->
    <main class="container my-5">
        {% block content %}
        {% endblock %}
    </main>

    <!-- FOOTER -->
    <footer class="text-center py-4 text-white mt-5">
        © {{ now|date:"Y" }} Amaral Cantina — Feito com cuidado 🍝
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
