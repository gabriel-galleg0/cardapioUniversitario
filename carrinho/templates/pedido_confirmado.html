{% load static %}
<!DOCTYPE html>
<html lang="pt-br" data-bs-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pedido Confirmado - Amaral Cantina</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/pedido_confirmado.css' %}">
</head>

<body>

  <div class="container">
    <div class="order-card">

      <!-- LOGO -->
      <div class="logo-area">
        <img src="{% static 'images/amaral-logo.jpeg' %}" alt="Logo">
      </div>

      <h1>Pedido Confirmado ✅</h1>

      <p class="subtitle">Seu número para retirada é:</p>

      <div id="orderNumber" class="order-number">001</div>

      <!-- RESUMO REAL DO PEDIDO -->
      <div class="summary">
        <h5 class="mb-4">Resumo do Pedido</h5>

        {% for item in pedido.itens %}
        <div class="summary-item">
          <span>{{ item.quantidade }}x {{ item.nome }}</span>
          <span>R$ {{ item.preco_total }}</span>
        </div>
        {% endfor %}

        <div class="summary-total">
          <span>Total</span>
          <span>R$ {{ pedido.total }}</span>
        </div>
      </div>

      <!-- BOTÃO VOLTAR -->
      <a href="/" class="btn btn-finish mt-4">
        Fazer novo pedido
      </a>

    </div>
  </div>

  <script>
    // Número de pedido incremental por sessão do navegador (sessionStorage reseta ao fechar)
    let orderNumber = parseInt(sessionStorage.getItem('orderNumber') || '0') + 1;
    sessionStorage.setItem('orderNumber', orderNumber);
    document.getElementById('orderNumber').innerText = String(orderNumber).padStart(3, '0');
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
